<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Aurova</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#14171C" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Aurova" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
  :root{
    --bg:#14171C; --surface:#1B1F26; --surface2:#20252D; --surface3:#262C35;
    --cream:#ECE7DC; --cream-dim:#B7B1A4; --champagne:#C9A96A; --champagne-line:rgba(201,169,106,.35);
    --muted:#8A8477; --rule:rgba(236,231,220,.10); --rule-strong:rgba(236,231,220,.18);
    --income:#7FB77E; --expense:#D98E80; --warn:#D8A657;
    --serif:Georgia,"Iowan Old Style","Palatino Linotype","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --shadow:0 12px 30px -14px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--cream-dim);font-family:var(--sans);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100%;}
  body{padding-bottom:96px;}
  h1,h2,h3{margin:0;font-weight:400;color:var(--cream);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:15px;min-width:0;max-width:100%;}
  /* En celular, campos a 16px para que iOS NO haga zoom automático al tocarlos */
  @media(max-width:560px){ input,select,textarea{font-size:16px !important;} }
  .num{font-variant-numeric:tabular-nums;}

  /* ---- App bar ---- */
  header.appbar{position:sticky;top:0;z-index:20;background:rgba(20,23,28,.86);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--rule);}
  .appbar-inner{max-width:720px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .mono{width:32px;height:32px;border:1px solid var(--champagne);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);
    font-size:17px;color:var(--champagne);flex:none;}
  .brand .name{font-family:var(--serif);font-size:17px;color:var(--cream);white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .brand .tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .month-nav{display:flex;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--rule);
    border-radius:999px;padding:3px;}
  .month-nav button{width:28px;height:28px;border-radius:50%;color:var(--cream-dim);font-size:16px;
    display:flex;align-items:center;justify-content:center;}
  .month-nav button:hover{background:var(--surface3);color:var(--cream);}
  .month-nav .lbl{font-size:12px;letter-spacing:.04em;padding:0 8px;color:var(--cream);white-space:nowrap;
    text-transform:capitalize;min-width:88px;text-align:center;}

  main{max-width:720px;margin:0 auto;padding:20px 18px 40px;}
  .view{animation:fade .35s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @media(prefers-reduced-motion:reduce){.view{animation:none;}}

  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--champagne);}
  .section-title{font-family:var(--serif);font-size:20px;color:var(--cream);margin:26px 0 12px;}
  .muted{color:var(--muted);}

  /* ---- Cards ---- */
  .card{background:var(--surface);border:1px solid var(--rule);border-radius:16px;padding:18px;box-shadow:var(--shadow);}
  .hero{background:linear-gradient(160deg,#1E232B,#181C22);border:1px solid var(--rule-strong);
    border-radius:20px;padding:26px 22px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;inset:-40% 30% auto -20%;height:200px;
    background:radial-gradient(closest-side,rgba(201,169,106,.14),transparent);pointer-events:none;}
  .hero .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--champagne);}
  .hero .big{font-family:var(--serif);font-size:clamp(40px,12vw,58px);color:var(--cream);line-height:1.05;margin:8px 0 4px;}
  .hero .sub{font-size:12.5px;color:var(--muted);}
  .hero.neg .big{color:var(--expense);}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .stat{background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:14px 16px;}
  .stat .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
  .stat .v{font-family:var(--serif);font-size:23px;margin-top:4px;}
  .v.income{color:var(--income);} .v.expense{color:var(--expense);} .v.cream{color:var(--cream);} .v.champ{color:var(--champagne);}

  /* ---- Lists ---- */
  .row{display:flex;align-items:center;gap:12px;padding:12px 4px;border-top:1px solid var(--rule);}
  .row:first-child{border-top:none;}
  .row .ic{width:38px;height:38px;border-radius:11px;background:var(--surface2);flex:none;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;color:var(--champagne);}
  .row .body{flex:1;min-width:0;}
  .row .t1{color:var(--cream);font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .t2{font-size:12px;color:var(--muted);}
  .row .amt{font-family:var(--serif);font-size:16px;text-align:right;white-space:nowrap;}
  .amt.income{color:var(--income);} .amt.expense{color:var(--cream);}
  .row .del{color:var(--muted);font-size:18px;padding:4px 6px;border-radius:8px;}
  .row .del:hover{color:var(--expense);background:var(--surface3);}

  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;
    border:1px solid var(--rule-strong);color:var(--cream-dim);}
  .chip.paid{color:var(--income);border-color:rgba(127,183,126,.4);background:rgba(127,183,126,.1);}
  .chip.pending{color:var(--warn);border-color:rgba(216,166,87,.4);background:rgba(216,166,87,.1);}
  .chip.champ{color:var(--champagne);border-color:var(--champagne-line,rgba(201,169,106,.35));background:rgba(201,169,106,.08);}

  /* progress */
  .bar{height:8px;border-radius:999px;background:var(--surface3);overflow:hidden;margin-top:8px;}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--champagne),#E0C489);border-radius:999px;}
  .bar.over>span{background:linear-gradient(90deg,var(--expense),#E7A99C);}
  .bar.good>span{background:linear-gradient(90deg,var(--income),#A6D0A5);}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--champagne);color:#1A1206;font-weight:700;border-radius:12px;padding:12px 18px;font-size:14.5px;}
  .btn:hover{filter:brightness(1.06);}
  .btn.ghost{background:transparent;color:var(--champagne);border:1px solid var(--champagne);}
  .btn.block{width:100%;}
  .btn.sm{padding:8px 14px;font-size:13px;border-radius:10px;}

  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:13.5px;}
  .empty .em-ic{font-family:var(--serif);font-size:34px;color:var(--rule-strong);}

  /* header row w/ action */
  .head-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:26px 0 12px;}
  .head-row .section-title{margin:0;}

  /* ---- Bottom nav ---- */
  nav.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(20,23,28,.94);
    backdrop-filter:blur(12px);border-top:1px solid var(--rule);padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  .tabs-inner{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:0;}
  .tab .tl{font-size:9.5px;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:12px;color:var(--muted);}
  .tab .ti{font-family:var(--serif);font-size:18px;line-height:1;}
  .tab .tl{font-size:10.5px;letter-spacing:.02em;}
  .tab.active{color:var(--champagne);}
  .tab.active .tl{color:var(--cream);}
  .tab:hover{color:var(--cream-dim);}
  /* Con un modal abierto, ocultar la barra de abajo y el botón + para que no roben el toque de los botones del modal */
  body.modal-open nav.tabs, body.modal-open .fab{display:none !important;}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(8,10,13,.6);backdrop-filter:blur(3px);
    display:flex;align-items:flex-end;justify-content:center;padding:0;}
  @media(min-width:560px){.overlay{align-items:center;padding:20px;}}
  .sheet{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--surface);border:1px solid var(--rule-strong);
    border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,.5);
    animation:slideup .28s cubic-bezier(.2,.7,.2,1) both;}
  @media(min-width:560px){.sheet{border-radius:20px;animation:fade .25s both;}}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
  .sheet h3{font-family:var(--serif);font-size:21px;margin-bottom:4px;}
  .sheet .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;letter-spacing:.04em;color:var(--cream-dim);margin-bottom:6px;}
  .field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--rule-strong);
    border-radius:11px;padding:12px 13px;color:var(--cream);outline:none;}
  .field input:focus,.field select:focus{border-color:var(--champagne);}
  .field.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .seg button{padding:11px;border-radius:11px;border:1px solid var(--rule-strong);color:var(--cream-dim);background:var(--surface2);font-weight:600;}
  .seg button.on-exp{border-color:var(--expense);color:var(--expense);background:rgba(217,142,128,.1);}
  .seg button.on-inc{border-color:var(--income);color:var(--income);background:rgba(127,183,126,.1);}
  .sheet-actions{display:flex;gap:10px;margin-top:8px;}
  .sheet-actions .btn{flex:1;}
  .linkbtn{color:var(--muted);font-size:12.5px;text-decoration:underline;}

  .fab{position:fixed;right:18px;bottom:calc(84px + env(safe-area-inset-bottom));z-index:29;
    width:56px;height:56px;border-radius:50%;background:var(--champagne);color:#1A1206;font-size:28px;
    display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px -6px rgba(201,169,106,.5);}
  .fab:hover{filter:brightness(1.06);}

  .catbar{height:6px;border-radius:999px;background:var(--surface3);overflow:hidden;margin-top:6px;}
  .catbar>span{display:block;height:100%;border-radius:999px;}
  .toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--surface3);color:var(--cream);border:1px solid var(--rule-strong);padding:10px 16px;border-radius:12px;
    font-size:13px;z-index:60;box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  /* ---- Auth gate ---- */
  #authGate{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto;overflow-x:hidden;}
  body.logged-out header.appbar, body.logged-out main, body.logged-out nav.tabs, body.logged-out .fab{display:none !important;}
  body.logged-out #authGate{display:block;}
  .auth-card{width:calc(100% - 40px);max-width:360px;margin:40px auto;background:var(--surface);border:1px solid var(--rule-strong);border-radius:20px;padding:28px 24px;box-shadow:var(--shadow);}
  .auth-card .field input{width:100%;background:var(--surface2);border:1px solid var(--rule-strong);border-radius:11px;padding:12px 13px;color:var(--cream);outline:none;font-size:15px;}
  .auth-card .field input:focus{border-color:var(--champagne);}
  .avatar-btn{width:32px;height:32px;border-radius:50%;background:var(--champagne);color:#1A1206;font-weight:700;font-size:12.5px;display:flex;align-items:center;justify-content:center;flex:none;font-family:var(--sans);letter-spacing:.02em;}
  .avatar-btn:hover{filter:brightness(1.06);}
  .avatar-lg{width:64px;height:64px;border-radius:50%;background:var(--champagne);color:#1A1206;font-weight:700;font-size:26px;font-family:var(--serif);display:flex;align-items:center;justify-content:center;margin:0 auto;}
  .onb-opt{display:flex;align-items:center;gap:10px;text-align:left;width:100%;background:var(--surface2);border:1px solid var(--rule-strong);border-radius:12px;padding:13px 15px;color:var(--cream);font-size:14.5px;}
  .onb-opt.sel{border-color:var(--champagne);background:rgba(201,169,106,.12);}
  .onb-opt:hover{border-color:var(--champagne);}
</style>
</head>

const TR_ORDER = Object.entries(TR_EN).sort((a,b)=>b[0].length-a[0].length);
function tr(html){ if(LANG!=="en"||typeof html!=="string") return html; let out=html; for(const [es,en] of TR_ORDER){ if(out.indexOf(es)>=0) out=out.split(es).join(en); } return out; }

function mapTipo(t,kind){
  const R={"Auto":kind==="pasivo"?"Préstamo de auto":"Vehículo","Propiedad / Casa":kind==="pasivo"?"Hipoteca":"Bienes raíces",
    "Propiedad":"Bienes raíces","Préstamo":"Préstamo personal","Préstamo del carro":"Préstamo de auto","Préstamo del auto":"Préstamo de auto",
    "Otro":kind==="pasivo"?"Otra deuda":"Otro activo"};
  if(R[t]) return R[t];
  const valid=["Efectivo","Ahorros","Inversiones","Retiro (401k/IRA)","Bienes raíces","Vehículo","Otro activo",
    "Tarjeta de crédito","Préstamo de auto","Préstamo estudiantil","Préstamo personal","Hipoteca","Otra deuda"];
  if(valid.includes(t)) return t;
  return kind==="pasivo"?"Otra deuda":"Otro activo";
}
function normalizeState(s){
  s.categories=s.categories||[]; s.transactions=s.transactions||[]; s.recurring=s.recurring||[];
  s.recurring.forEach(r=>{ if(!r.type) r.type="gasto"; if(!r.freq) r.freq="mensual"; });
  s.goals=s.goals||[]; s.budgets=s.budgets||{}; s.accounts=s.accounts||[]; s.nwHistory=s.nwHistory||[];
  s.profile = s.profile || {};
  if(s.profile.name==null) s.profile.name="";
  if(s.profile.currency==null) s.profile.currency="USD";
  if(s.profile.goal==null) s.profile.goal="";
  if(s.profile.payFreq==null) s.profile.payFreq="";
  if(s.profile.reminders==null) s.profile.reminders=true;
  if(s.profile.lang==null) s.profile.lang="es";
  if(s.profile.plan==null) s.profile.plan="free";
  if(s.profile.planSource==null) s.profile.planSource="";
  if(s.profile.planExpires===undefined) s.profile.planExpires=null;
  if(s.profile.referralCode==null) s.profile.referralCode="";
  if(s.profile.referredBy==null) s.profile.referredBy="";
  if(s.profile.discount===undefined) s.profile.discount=null;
  if(s.profile.household===undefined) s.profile.household=null;
  if(s.profile.iaUsage==null) s.profile.iaUsage={date:"",count:0};
  if(s.profile.createdAt==null) s.profile.createdAt=todayISO();
  // migración al modelo final: cada cuenta un solo lado (kind + value)
  const norm=[];
  s.accounts.forEach(a=>{
    if(a.assetValue!=null || a.debtBalance!=null){ // modelo intermedio (mezclado) -> separa
      const av=+a.assetValue||0, dv=+a.debtBalance||0;
      if(av>0) norm.push({id:a.id,kind:"activo",type:mapTipo(a.type,"activo"),value:av,rate:+a.rate||0,payment:0,dueDay:1,limit:0,paid:[],paidLog:[]});
      if(dv>0) norm.push({id:a.id+"_d",kind:"pasivo",type:mapTipo(a.type,"pasivo"),value:dv,rate:+a.rate||0,payment:+a.payment||0,dueDay:a.dueDay||1,limit:+a.limit||0,paid:a.paid||[],paidLog:a.paidLog||[]});
    } else if(a.kind && a.value!=null){ // modelo final o kind/value viejo
      norm.push({id:a.id,kind:a.kind,type:mapTipo(a.type,a.kind),value:+a.value||0,rate:+a.rate||0,payment:+a.payment||0,dueDay:a.dueDay||1,limit:+a.limit||0,paid:a.paid||[],paidLog:a.paidLog||[]});
    }
  });
  s.accounts=norm;
  return s;
}
// Claves de "finanzas" (lo que se comparte en cuenta conjunta; el perfil NO se comparte)
const FINANCE_KEYS=["categories","transactions","recurring","goals","budgets","accounts","nwHistory"];
function financesOf(s){ const o={}; FINANCE_KEYS.forEach(k=>{ if(s[k]!==undefined) o[k]=s[k]; }); return o; }
function load(){
  try{ const raw = localStorage.getItem(KEY); if(raw) return normalizeState(JSON.parse(raw)); }catch(e){}
  return seed();
}
let saveTimer;
function recordNW(){
  if(!state.nwHistory) state.nwHistory=[];
  const m=curMonth(), v=Math.round(patrimonio());
  const i=state.nwHistory.findIndex(x=>x.m===m);
  if(i>=0) state.nwHistory[i].v=v; else state.nwHistory.push({m,v});
  state.nwHistory=state.nwHistory.slice(-24);
}
function save(){
  try{ recordNW(); }catch(e){}
  localStorage.setItem(KEY, JSON.stringify(state));
  if(USER){ clearTimeout(saveTimer); saveTimer=setTimeout(pushCloud, 700); }
}
async function pushCloud(){
  if(!USER) return;
  const now=new Date().toISOString();
  try{
    if(MODE==="household" && HH){
      await sb.from("household_data").upsert({household_id:HH,data:financesOf(state),updated_at:now});
      await sb.from("user_data").upsert({user_id:USER.id,data:Object.assign({},PERSONAL||{},{profile:state.profile}),updated_at:now});
    } else {
      await sb.from("user_data").upsert({user_id:USER.id,data:state,updated_at:now});
      PERSONAL=financesOf(state);
    }
  }catch(e){ /* queda en localStorage; reintenta en el próximo save */ }
}

function seed(){
  const cat = (name,kind,color)=>({id:uid(),name,kind,color});
  const cats = [
    cat("Salario","ingreso","#7FB77E"), cat("Spark / Delivery","ingreso","#87B9C4"), cat("Otros ingresos","ingreso","#A6C48A"),
    cat("Renta","gasto","#D98E80"), cat("Comida","gasto","#E0B36A"), cat("Transporte","gasto","#C9A96A"),
    cat("Servicios","gasto","#B892C4"), cat("Entretenimiento","gasto","#87B9C4"), cat("Salud","gasto","#7FB77E"),
    cat("Deudas","gasto","#D98E80"), cat("Otros gastos","gasto","#8A8477")
  ];
  return { categories:cats, transactions:[], recurring:[], goals:[], budgets:{}, accounts:[], nwHistory:[], profile:{name:"",goal:"",currency:"USD",payFreq:"",reminders:true,lang:"es",plan:"free",planSource:"",planExpires:null,referralCode:"",referredBy:"",discount:null,household:null,createdAt:todayISO()}, seeded:false };
}

/* ============ Helpers de datos ============ */
const cats = ()=>state.categories;
const catById = id => state.categories.find(c=>c.id===id) || {name:"Sin categoría",color:"#8A8477",kind:"gasto"};
const gastoCats = ()=>state.categories.filter(c=>c.kind==="gasto");
const ingresoCats = ()=>state.categories.filter(c=>c.kind==="ingreso");
const inMonth = (iso,m)=> (iso||"").slice(0,7)===m;
const txnsOf = m => state.transactions.filter(t=>inMonth(t.date,m));

function ingresosMes(m){ return txnsOf(m).filter(t=>t.type==="ingreso").reduce((s,t)=>s+t.amount,0); }
function gastosMes(m){ return txnsOf(m).filter(t=>t.type==="gasto").reduce((s,t)=>s+t.amount,0); }
function aportesMetasMes(m){ return state.goals.reduce((s,g)=>s+(g.contribs||[]).filter(c=>c.month===m).reduce((a,c)=>a+c.amount,0),0); }
// Deudas con pago mensual = obligaciones pagables (se unen a la sección Pagos)
function deudasPagables(){ return state.accounts.filter(a=>a.kind==="pasivo" && (+a.value||0)>0 && (+a.payment||0)>0); }
// Todos los pagos del mes (recurrentes manuales + deudas), unificados
function pagosDelMes(m){
  const rec = state.recurring.filter(r=>(r.type||"gasto")==="gasto").map(r=>({id:r.id,name:r.name,amount:+r.amount||0,dueDay:r.dueDay||1,paid:(r.paid||[]).includes(m),source:"rec"}));
  const deu = deudasPagables().map(a=>({id:a.id,name:a.name,amount:+a.payment||0,dueDay:a.dueDay||1,paid:(a.paid||[]).includes(m),source:"deuda"}));
  return rec.concat(deu).sort((x,y)=>x.dueDay-y.dueDay);
}
function pagosPendientes(m){ return pagosDelMes(m).filter(p=>!p.paid).reduce((s,p)=>s+p.amount,0); }
function meQueda(m){ return ingresosMes(m) - gastosMes(m) - pagosPendientes(m) - aportesMetasMes(m); }

  document.getElementById("monthLabel").textContent = mesLabel(SEL);
  const ab=document.getElementById("avatarBtn"); if(ab) ab.textContent = perfilIniciales();
  const mp=document.getElementById("mPrev"), mnx=document.getElementById("mNext");
  if(mp) mp.setAttribute("aria-label", tr("Mes anterior")); if(mnx) mnx.setAttribute("aria-label", tr("Mes siguiente"));
  document.getElementById("fab").style.display = (VIEW==="inicio"||VIEW==="movimientos") ? "flex":"none";
  renderTabs();
  const el = document.getElementById("app");
  el.innerHTML = "";
  const v = document.createElement("div"); v.className="view";
  v.innerHTML = tr(({inicio:viewInicio, movimientos:viewMovimientos, pagos:viewPagos, metas:viewMetas, presupuesto:viewPresupuesto, analisis:viewAnalisis})[VIEW]());
  el.appendChild(v);
}
function mesLabel(m){ const [y,mo]=m.split("-"); const arr=LANG==="en"?MESES_EN:MESES; return arr[+mo-1]+" "+y; }
function shiftMonth(d){ const dt=new Date(SEL+"-01T00:00"); dt.setMonth(dt.getMonth()+d); SEL=dt.toISOString().slice(0,7); render(); }
function go(v){ VIEW=v; window.scrollTo(0,0); render(); }

function txnListHTML(){
  let ts = txnsOf(SEL).slice().sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  const q=txnQuery.trim().toLowerCase();
  if(txnCatFilter) ts=ts.filter(t=>t.categoryId===txnCatFilter);
  if(q) ts=ts.filter(t=>{const c=catById(t.categoryId);return (t.note||"").toLowerCase().includes(q)||c.name.toLowerCase().includes(q);});
  if(!ts.length) return `<div class="empty"><div class="em-ic">≡</div>${(txnQuery||txnCatFilter)?"Sin resultados con ese filtro.":`Sin movimientos en ${mesLabel(SEL)}.<br>Toca <b style="color:var(--champagne)">+ Agregar</b> para el primero.`}</div>`;
  return ts.map(t=>{const c=catById(t.categoryId);return `
    <div class="row">
      <div class="ic" style="color:${c.color}">${t.type==="ingreso"?"↑":"↓"}</div>
      <div class="body"><div class="t1">${esc(c.name)}</div><div class="t2">${fdate(t.date)}${t.note?" · "+esc(t.note):""}</div></div>

      <button class="del" onclick="delTxn('${t.id}')" aria-label="Eliminar">×</button>
    </div>`;}).join("");
}
function filtrarTxn(){ txnQuery=document.getElementById("txnQuery").value; txnCatFilter=document.getElementById("txnCatFilter").value; document.getElementById("txnList").innerHTML=txnListHTML(); }

    ${state.goals.length? state.goals.map(g=>{

      return `
      <div class="card" style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">

          <button class="del" onclick="delGoal('${g.id}')" aria-label="Eliminar">×</button>
        </div>
        <div class="bar good" style="margin:12px 0 6px;"><span style="width:${p}%"></span></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;">
          <span class="num" style="color:var(--champagne)">${money2(g.saved)}</span>
          <span class="num muted">de ${money2(g.target)}</span>
        </div>
        <div class="grid2" style="margin-top:14px;">
          <div class="stat"><div class="k">Te falta</div><div class="v cream num" style="font-size:19px;">${money(rest)}</div></div>
          <div class="stat"><div class="k">Ahorra por semana</div><div class="v champ num" style="font-size:19px;">${semanal?money(semanal):"—"}</div></div>
        </div>
        <button class="btn block sm" style="margin-top:14px;" onclick="openAportar('${g.id}')">Aportar dinero</button>
      </div>`}).join("")
    : `<div class="card"><div class="empty"><div class="em-ic">✦</div>Crea tu primera meta: fondo de emergencia, un carro, vacaciones, pagar una deuda…<br><br><button class="btn sm" onclick="openGoal()">Crear meta</button></div></div>`}
  `;
}
function semanalMeta(g){
  if(!g.targetDate) return 0;
  const rest=Math.max(0,g.target-g.saved); if(rest<=0) return 0;
  const dias=(new Date(g.targetDate)-new Date())/(1000*60*60*24);
  const semanas=Math.max(1,dias/7);
  return rest/semanas;
}

/* ============ VISTA: PRESUPUESTO (PLAN) ============ */
function factorFreq(f){ return ({semanal:52/12,quincenal:26/12,mensual:1})[f]||1; }
function freqLabel(f){ return ({semanal:"semanal",quincenal:"cada 2 sem",mensual:"mensual"})[f]||"mensual"; }
function expectedMensual(r){ return (+r.amount||0)*factorFreq(r.freq||"mensual"); }
function recibidoDe(r,m){ return txnsOf(m).filter(t=>t.type==="ingreso"&&t.note===r.name+" (pago)").reduce((s,t)=>s+t.amount,0); }
function viewPresupuesto(){
  const incomes = state.recurring.filter(r=>r.type==="ingreso").sort((a,b)=>(a.dueDay||1)-(b.dueDay||1));
  const planIngreso = incomes.reduce((s,r)=>s+expectedMensual(r),0);
  const gc = gastoCats();
  const rows = gc.map(c=>{
    const limit = state.budgets[c.id]||0;
    const spent = txnsOf(SEL).filter(t=>t.type==="gasto"&&t.categoryId===c.id).reduce((s,t)=>s+t.amount,0);
    return {c,limit,spent};
  });
  const totLim = rows.reduce((s,r)=>s+r.limit,0), totSpent=rows.reduce((s,r)=>s+r.spent,0);
  const diff = planIngreso - totLim, hasInc = incomes.length>0;
  return `
    <div class="hero" style="text-align:left;padding:20px;">
      <div class="lbl">Plan del mes</div>
      <div class="big num" style="font-size:clamp(30px,9vw,42px);color:${!hasInc?'var(--champagne)':(diff>=0?'var(--income)':'var(--expense)')}">${hasInc?money(diff):"—"}</div>
      <div class="sub">${!hasInc?'Agrega tus ingresos para armar tu plan':(diff>=0?'te sobraría si cumples el plan':'tu plan gasta más de lo que ganas')}</div>
      <div style="display:flex;gap:20px;margin-top:14px;font-size:12px;flex-wrap:wrap;">
        <span class="muted">Ingreso planeado&nbsp; <b class="num" style="color:var(--income)">${money(planIngreso)}</b></span>
        <span class="muted">Gasto planeado&nbsp; <b class="num" style="color:var(--cream)">${money(totLim)}</b></span>
      </div>
    </div>

    <div class="head-row"><h2 class="section-title">Ingresos planeados</h2><button class="btn sm" onclick="openRec('ingreso')">+ Agregar</button></div>
    <div class="card">
      ${incomes.length? incomes.map(r=>{const rec=recibidoDe(r,SEL),esp=expectedMensual(r);return `
        <div class="row">
          <div class="ic" style="color:var(--income)">↑</div>
          <div class="body">
            <div class="t1">${esc(r.name)}</div>
            <div class="t2">${money(r.amount)} ${freqLabel(r.freq)} · ~${money(esp)}/mes · recibido ${money(rec)}</div>
          </div>
          <button class="btn ghost sm" onclick="recibirPago('${r.id}')">Recibir</button>
          <button class="del" onclick="editRec('${r.id}')" aria-label="Editar">✎</button>
          <button class="del" onclick="delRec('${r.id}')" aria-label="Eliminar">×</button>
        </div>`}).join("")
      : `<div class="empty"><div class="em-ic">↑</div>Agrega tu sueldo: monto, frecuencia (semanal, bi-weekly, mensual) y día de pago.</div>`}
    </div>
    <p class="muted" style="font-size:12px;margin:8px 2px 0;">Toca <b style="color:var(--champagne)">Recibir</b> cada vez que te paguen — registra el ingreso real de ese día.</p>

    <div class="head-row"><h2 class="section-title">Gasto planeado</h2></div>
    <div class="grid2">
      <div class="stat"><div class="k">Presupuesto total</div><div class="v cream num">${money(totLim)}</div></div>
      <div class="stat"><div class="k">Gastado</div><div class="v ${totSpent>totLim&&totLim?'expense':'champ'} num">${money(totSpent)}</div></div>
    </div>
    <div class="card">
      ${rows.map(({c,limit,spent})=>{
        const p = limit? Math.min(100,spent/limit*100):0; const over = limit && spent>limit;
        return `
        <div class="row" style="display:block;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="t1" style="font-size:14px;">${esc(c.name)}</span>
            <span style="display:flex;align-items:center;gap:8px;">
              <span class="t2 num" style="color:${over?'var(--expense)':'var(--cream-dim)'}">${money(spent)} / ${limit?money(limit):"—"}</span>
              <button class="btn ghost sm" onclick="openBudget('${c.id}')">${limit?"Editar":"Poner"}</button>
            </span>
          </div>
          ${limit?`<div class="bar ${over?'over':''}"><span style="width:${p}%"></span></div>`:""}
        </div>`}).join("")}
    </div>
    <p class="muted" style="font-size:12px;margin-top:12px;">Define cuánto quieres gastar como máximo en cada categoría. La barra se pone roja si te pasas.</p>`;
}

/* ============ Acciones ============ */
function recTag(r){ return r.type==="ingreso"?" (ingreso fijo)":" (pago fijo)"; }
function pagarRec(id){
  const r=state.recurring.find(x=>x.id===id); if(!r) return;
  r.paid=r.paid||[]; if(!r.paid.includes(SEL)) r.paid.push(SEL);
  state.transactions.push({id:uid(),type:r.type||"gasto",amount:r.amount,categoryId:r.categoryId,date:SEL+"-"+String(r.dueDay).padStart(2,"0"),note:r.name+recTag(r)});
  save(); toast(r.type==="ingreso"?"Ingreso registrado":"Pago registrado"); render();
}
function unpagarRec(id){
  const r=state.recurring.find(x=>x.id===id); if(!r) return;
  r.paid=(r.paid||[]).filter(m=>m!==SEL);
  const i=state.transactions.findIndex(t=>t.note===r.name+recTag(r)&&inMonth(t.date,SEL));
  if(i>=0) state.transactions.splice(i,1);
  save(); render();
}
function deudaCatId(){ const c=state.categories.find(x=>x.kind==="gasto"&&x.name==="Deudas"); return c?c.id:(gastoCats()[0]&&gastoCats()[0].id); }
function pagarDeuda(id){
  const a=state.accounts.find(x=>x.id===id); if(!a) return;
  a.paid=a.paid||[]; if(a.paid.includes(SEL)) return;
  const bal=+a.value||0, rate=+a.rate||0, pay=+a.payment||0;
  const interes = bal*(rate/1200);
  const principal = Math.max(0, Math.min(bal, pay-interes));
  a.value = Math.max(0, bal-principal);
  a.paid.push(SEL);
  a.paidLog=a.paidLog||[]; a.paidLog.push({month:SEL,principal,interes,pay});
  state.transactions.push({id:uid(),type:"gasto",amount:pay,categoryId:deudaCatId(),date:SEL+"-"+String(a.dueDay||1).padStart(2,"0"),note:a.name+" (pago de deuda)"});
  save(); toast("Pago aplicado · saldo actualizado"); render();
}
function unpagarDeuda(id){
  const a=state.accounts.find(x=>x.id===id); if(!a) return;
  a.paidLog=a.paidLog||[]; const idx=a.paidLog.map(l=>l.month).lastIndexOf(SEL);
  if(idx>=0){ a.value=(+a.value||0)+(+a.paidLog[idx].principal||0); a.paidLog.splice(idx,1); }
  a.paid=(a.paid||[]).filter(m=>m!==SEL);

const SVGTXT='font-family="Arial,Helvetica,sans-serif"';
function moneyK(n){ const sym=curSymbol(); const neg=n<0; n=Math.round(Math.abs(n)); const str=n>=1000?sym+(n/1000).toFixed(n%1000===0?0:1)+"k":sym+n; return (neg?"-":"")+str; }
function svgWrap(W,H,s){ return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${s}</svg>`; }
function svgIngGas(meses){
  const data=meses.map(m=>({m,a:ingresosMes(m),b:gastosMes(m)}));
  const max=Math.max(1,...data.map(d=>Math.max(d.a,d.b)));
  const W=340,H=170,padB=22,padT=16,n=data.length,gw=W/n,area=H-padB-padT,fs=n>8?5.5:6.5;
  const bw=Math.max(3,Math.min(11,gw/2-6)), sepx=Math.min(5,gw*0.09);
  let s=`<line x1="0" y1="${H-padB}" x2="${W}" y2="${H-padB}" stroke="rgba(236,231,220,.12)"/>`;
  data.forEach((d,i)=>{const cx=i*gw+gw/2, ha=(d.a/max)*area, hb=(d.b/max)*area;
    const gxL=cx-sepx-bw, rxL=cx+sepx, gcx=gxL+bw/2, rcx=rxL+bw/2;  // barras separadas
    s+=`<rect x="${gxL}" y="${H-padB-ha}" width="${bw}" height="${ha}" rx="2" fill="#7FB77E"/>`;
    s+=`<rect x="${rxL}" y="${H-padB-hb}" width="${bw}" height="${hb}" rx="2" fill="#D98E80"/>`;
    // número justo encima de cada barra
    if(d.a>0) s+=`<text x="${gcx}" y="${H-padB-ha-4}" fill="#A6D0A5" font-size="${fs}" text-anchor="middle" ${SVGTXT}>${moneyK(d.a)}</text>`;
    if(d.b>0) s+=`<text x="${rcx}" y="${H-padB-hb-4}" fill="#D98E80" font-size="${fs}" text-anchor="middle" ${SVGTXT}>${moneyK(d.b)}</text>`;

function svgFlujo(meses){
  const data=meses.map(m=>({m,v:ingresosMes(m)-gastosMes(m)}));
  const max=Math.max(1,...data.map(d=>Math.abs(d.v)));
  const W=340,H=176,mid=H/2-2,n=data.length,gw=W/n,bw=Math.min(16,gw-8),fs=n>8?6.5:7.5;
  let s=`<line x1="0" y1="${mid}" x2="${W}" y2="${mid}" stroke="rgba(236,231,220,.18)"/>`;
  data.forEach((d,i)=>{const cx=i*gw+gw/2, h=(Math.abs(d.v)/max)*(mid-24), y=d.v>=0?mid-h:mid;
    s+=`<rect x="${cx-bw/2}" y="${y}" width="${bw}" height="${Math.max(1,h)}" rx="2" fill="${d.v>=0?'#7FB77E':'#D98E80'}"/>`;
    if(d.v!==0) s+=`<text x="${cx}" y="${d.v>=0?y-4:y+h+10}" fill="${d.v>=0?'#A6D0A5':'#D98E80'}" font-size="${fs}" text-anchor="middle" ${SVGTXT}>${moneyK(d.v)}</text>`;
    s+=`<text x="${cx}" y="${H-4}" fill="#8A8477" font-size="9" text-anchor="middle" ${SVGTXT}>${mlabel3(d.m)}</text>`;});

}
function svgAhorro(meses){

  let s=`<line x1="0" y1="${H-padB}" x2="${W}" y2="${H-padB}" stroke="rgba(236,231,220,.12)"/>`;
  data.forEach((d,i)=>{const cx=i*gw+gw/2, h=(d.v/max)*area;
    s+=`<rect x="${cx-bw/2}" y="${H-padB-h}" width="${bw}" height="${Math.max(0,h)}" rx="2" fill="#C9A96A"/>`;
    if(d.v>0) s+=`<text x="${cx}" y="${H-padB-h-4}" fill="#C9A96A" font-size="${fs}" text-anchor="middle" ${SVGTXT}>${moneyK(d.v)}</text>`;

function svgNW(){

  const W=340,H=176,padB=22,padT=22,area=H-padB-padT,n=h.length,gw=W/n;

function listSide(kind){

  const code=(raw||"").trim().toUpperCase();
  if(!code) return {ok:false,msg:"Escribe un código"};
  try{

      } else { state.profile.discount={code,percent:promo.percent}; save(); return {ok:true,msg:"Descuento de "+promo.percent+"% aplicado ✓"}; }
    }

async function crearParejas(){

async function unirseParejas(codeRaw){
  const code=(codeRaw||"").trim().toUpperCase();

  try{

    await sb.from("household_members").insert({household_id:hh.id,user_id:USER.id,name:(state.profile&&state.profile.name)||""});
    const {data:hd}=await sb.from("household_data").select("data").eq("household_id",hh.id).maybeSingle();
    state=Object.assign({profile:state.profile}, financesOf(normalizeState((hd&&hd.data)||{})));

async function salirParejas(){

  state=Object.assign({profile:state.profile}, PERSONAL||financesOf(seed()));

}
async function separarParejas(){
  if(!confirm(tr("¿Separar las cuentas? Te quedas con una copia de estas finanzas como tuyas, y sales de la cuenta conjunta.")))return;

/* ============ Asistente IA ============ */
let IA_MSGS=[];
function contextoFinanciero(){
  const m=SEL;
  const porCat={}; txnsOf(m).filter(t=>t.type==="gasto").forEach(t=>{const n=catById(t.categoryId).name; porCat[n]=(porCat[n]||0)+t.amount;});
  const cats=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,v])=>n+": "+money(v)).join(", ");
  const metas=state.goals.map(g=>g.name+" ("+money(g.saved)+"/"+money(g.target)+")").join(", ");
  const deudas=state.accounts.filter(a=>a.kind==="pasivo").map(a=>a.name+" "+money(a.value)+(a.rate?" @"+a.rate+"%":"")).join(", ");
  return `Moneda: ${curInfo().code}. Mes: ${mesLabel(m)}.
Ingresos del mes: ${money(ingresosMes(m))}. Gastos del mes: ${money(gastosMes(m))}. Le queda para gastar: ${money(meQueda(m))}.
Patrimonio neto: ${money(patrimonio())} (activos ${money(totActivos())}, deudas ${money(totPasivos())}). Intereses de deuda al mes: ${money(interesMes())}.
Gastos por categoría: ${cats||"—"}. Deudas: ${deudas||"—"}. Metas: ${metas||"—"}.`;
}
function openAsistente(){
  if(!planActivo()){ openUpsell("El asistente IA"); return; }
  modal(`<div style="display:flex;flex-direction:column;height:70vh;max-height:560px;">
    <div style="text-align:center;margin-bottom:6px;"><div style="font-size:26px">🤖</div><h3 style="font-family:var(--serif);font-size:20px;color:var(--cream);margin:2px 0;">Asistente Aurova</h3><div class="sub" style="font-size:12px;">Pregúntame sobre tu dinero.</div></div>
    <div id="iaMsgs" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 2px;"></div>
    <div style="display:flex;gap:8px;margin-top:8px;"><input id="iaInput" type="text" placeholder="Ej. ¿En qué gasto de más?" onkeydown="if(event.key==='Enter')enviarIA()" style="flex:1;background:var(--surface2);border:1px solid var(--rule-strong);border-radius:11px;padding:11px 13px;color:var(--cream);outline:none;"><button class="btn sm" id="iaSend" onclick="enviarIA()">Enviar</button></div>
    <button class="btn ghost block" style="margin-top:8px;" onclick="closeModal()">Cerrar</button></div>`);
  pintarIA();
}
function sugerenciasIA(){
  const qs=["¿En qué estoy gastando de más?","¿Cómo puedo ahorrar más?","Dame un consejo para mis deudas","¿Voy bien este mes?"];
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:20px 4px;">${qs.map(q=>`<button class="chip champ" style="cursor:pointer;" onclick="enviarIA(this.textContent)">${q}</button>`).join("")}</div>`;
}
function pintarIA(){
  const el=document.getElementById("iaMsgs"); if(!el) return;
  if(!IA_MSGS.length){ el.innerHTML=tr(sugerenciasIA()); return; }
  el.innerHTML=IA_MSGS.map(m=>`<div style="align-self:${m.role==="user"?"flex-end":"flex-start"};max-width:82%;background:${m.role==="user"?"var(--champagne)":"var(--surface2)"};color:${m.role==="user"?"#1A1206":"var(--cream)"};border:1px solid var(--rule-strong);border-radius:14px;padding:9px 13px;font-size:13.5px;line-height:1.5;white-space:pre-wrap;">${esc(m.text)}</div>`).join("");
  el.scrollTop=el.scrollHeight;
}
async function enviarIA(preset){
  const inp=document.getElementById("iaInput");
  const q=((preset&&typeof preset==="string")?preset:(inp&&inp.value)||"").trim(); if(!q) return;
  if(inp) inp.value="";
  const today=todayISO(); const u=(state.profile&&state.profile.iaUsage)||{date:"",count:0};
  if(u.date!==today){ u.date=today; u.count=0; }
  const LIMIT=esAdmin()?300:30;
  IA_MSGS.push({role:"user",text:q});
  if(u.count>=LIMIT){ IA_MSGS.push({role:"assistant",text:tr("Llegaste al límite de preguntas por hoy. Vuelve mañana.")}); pintarIA(); return; }
  u.count++; if(state.profile) state.profile.iaUsage=u; save();
  IA_MSGS.push({role:"assistant",text:"…"}); pintarIA();
  const btn=document.getElementById("iaSend"); if(btn) btn.disabled=true;
  let ans;
  try{
    const {data,error}=await sb.functions.invoke("ai-chat",{body:{context:contextoFinanciero(),question:q,lang:LANG}});
    if(error) ans=tr("Hubo un problema al conectar. Intenta de nuevo.");
    else if(data&&data.error==="no_key") ans=tr("El asistente aún no está configurado (falta la API key).");
    else if(data&&data.error) ans=tr("No pude responder ahora. Intenta de nuevo.");
    else ans=(data&&data.text)||"…";
  }catch(e){ ans=tr("No pude responder ahora."); }
  IA_MSGS[IA_MSGS.length-1].text=ans;
  const b2=document.getElementById("iaSend"); if(b2) b2.disabled=false;
  pintarIA();
}
